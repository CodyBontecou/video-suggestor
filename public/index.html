<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA·LOG — Video Ideas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="header">
    <a href="/" class="logo">IDEA<span class="logo-dot">·</span>LOG</a>
    <div class="header-right">
      <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <span class="theme-icon">◑</span>
      </button>
      <div id="auth-area" class="auth-area"></div>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="sort-controls" role="group" aria-label="Sort by">
        <button class="sort-btn active" data-sort="votes">↑ VOTES</button>
        <button class="sort-btn" data-sort="newest">NEW</button>
        <button class="sort-btn" data-sort="oldest">OLD</button>
      </div>
      <button id="submit-btn" class="submit-btn" style="display:none" onclick="showCreateModal()">+ SUBMIT</button>
    </div>
    <span id="post-count" class="post-count" aria-live="polite">— IDEAS</span>
  </div>

  <main id="main">
    <div id="feed" class="feed" role="feed">
      <div class="state-msg">
        <span class="loading-text">LOADING</span><span class="loading-dots" aria-hidden="true">···</span>
      </div>
    </div>
  </main>

  <div id="auth-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Sign in">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">AUTHENTICATE</span>
        <button class="modal-close icon-btn" id="modal-close" aria-label="Close">×</button>
      </div>
      <p class="modal-desc">Sign in to upvote ideas</p>
      <div class="auth-buttons">
        <a href="/api/auth/github" class="auth-btn">
          <svg class="auth-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GITHUB
        </a>
        <a href="/api/auth/google" class="auth-btn">
          <svg class="auth-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          GOOGLE
        </a>
      </div>
    </div>
  </div>

  <div id="create-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Submit idea">
    <div class="modal create-modal">
      <div class="modal-header">
        <span class="modal-title">SUBMIT IDEA</span>
        <button class="modal-close icon-btn" id="create-modal-close" aria-label="Close">×</button>
      </div>
      <p class="modal-desc">Share a video idea with the community</p>
      <form id="create-form">
        <div class="form-group">
          <label class="form-label" for="create-title">TITLE <span class="form-required">*</span></label>
          <input type="text" id="create-title" class="form-input" placeholder="Video idea title..." required maxlength="200" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="create-content">DESCRIPTION</label>
          <textarea id="create-content" class="form-textarea" placeholder="Describe the idea... (markdown supported)"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="create-tags">TAGS</label>
          <input type="text" id="create-tags" class="form-input" placeholder="javascript, react, tutorial" autocomplete="off">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" onclick="closeCreateModal()">CANCEL</button>
          <button type="submit" class="btn-primary" id="create-submit">SUBMIT</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
